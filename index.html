<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue2cdn多文件组件化IE兼容</title>
  <script src="lib/core-js-minified.js"></script>
  <script src="lib/vue2.7.16.min.js"></script>
  <script src="lib/require.js"></script>
  <script src="src/utils/ES_Polyfill.js"></script>
  <link rel="stylesheet" href="src/styles/global.css">
</head>

<body>

  <div id="app">
    <app></app>
  </div>

  <script>
    requirejs.config({
      baseUrl: '',
      paths: {
        css: 'plugins/css',
        html: 'plugins/html'
      }
    });

    // 第一步：加载组件名称列表
    require(['src/components/index.js'], function (list) {

      // 第二步：根据列表动态加载所有组件模块
      var paths = list.map(function (name) { return 'src/components/' + name + '/' + name + '.js'; })
      require(paths, function () {
        var args = arguments;
        list.forEach(function (name, i) { Vue.component(name, args[i]); }); // 注册为全局组件

        require(['html!src/App.html'], function (template) {
          new Vue({
            el: '#app',
            components: {
              app: { template: template }
            }
          });
        })
        
      });

    });
  </script>

</body>

</html>
