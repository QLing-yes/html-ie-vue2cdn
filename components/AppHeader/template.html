<header class="hd-root">
  <div class="hd-logo">T</div>
  <span class="hd-title">{{ title }}</span>
  <span class="hd-sep">/</span>
  <span class="hd-sub">任务板</span>
  <div class="ml-auto flex items-center">
    <span class="hd-badge hd-badge--mr">待处理 <strong>{{ pendingCount }}</strong></span>
    <span class="hd-badge hd-badge--mr">已完成 <strong>{{ doneCount }}</strong></span>
    <button class="btn btn-primary" v-on:click="$emit('add')">+ 新建任务</button>
  </div>
</header>
